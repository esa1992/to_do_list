name: cross_todo
description: Cross-platform todo app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  flutter_secure_storage: ^9.2.2
  intl: ^0.19.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3
  sqflite: ^2.3.3+1
  path: ^1.9.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon_1024.png"
  min_sdk_android: 21
  macos:
    generate: true
    image_path: "assets/icon/app_icon_1024.png"