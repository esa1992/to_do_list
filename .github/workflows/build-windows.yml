name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Ensure Windows Platform Files
        working-directory: frontend
        run: flutter create . --platforms=windows

      - name: Get Dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build Windows Release
        working-directory: frontend
        run: flutter build windows --release --dart-define=API_BASE_URL=https://to-do-list-backend-yrwf.onrender.com

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cross_todo-windows-release
          path: frontend/build/windows/x64/runner/Release
          if-no-files-found: error
