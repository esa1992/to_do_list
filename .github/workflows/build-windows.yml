name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Ensure Windows Platform Files
        working-directory: frontend
        run: flutter create . --platforms=windows

      - name: Get Dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Apply Custom Windows App Icon
        working-directory: frontend
        run: dart run flutter_launcher_icons --file flutter_launcher_icons_windows.yaml

      - name: Build Windows Release
        working-directory: frontend
        run: flutter build windows --release --dart-define=API_BASE_URL=https://to-do-list-backend-yrwf.onrender.com

      - name: Create Portable ZIP
        shell: pwsh
        run: |
          $releaseDir = "frontend/build/windows/x64/runner/Release"
          $zipPath = "frontend/build/windows/x64/runner/cross_todo-portable-win64.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "$releaseDir\*" -DestinationPath $zipPath

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cross_todo-windows-release
          path: frontend/build/windows/x64/runner/Release
          if-no-files-found: error

      - name: Upload Windows Portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: cross_todo-portable-win64
          path: frontend/build/windows/x64/runner/cross_todo-portable-win64.zip
          if-no-files-found: error
