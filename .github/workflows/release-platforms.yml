name: Release Platforms

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  windows:
    name: Build Windows Portable
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Ensure Windows Platform Files
        working-directory: frontend
        run: flutter create . --platforms=windows

      - name: Get Dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Apply Custom Windows App Icon
        working-directory: frontend
        run: dart run flutter_launcher_icons --file flutter_launcher_icons_windows.yaml

      - name: Build Windows Release
        working-directory: frontend
        run: flutter build windows --release --dart-define=API_BASE_URL=https://to-do-list-backend-yrwf.onrender.com

      - name: Create Portable ZIP
        shell: pwsh
        run: |
          $releaseDir = "frontend/build/windows/x64/runner/Release"
          $zipPath = "frontend/build/windows/x64/runner/cross_todo-portable-win64.zip"
          $portableDir = "frontend/build/windows/x64/runner/portable"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          if (Test-Path $portableDir) { Remove-Item $portableDir -Recurse -Force }
          New-Item -ItemType Directory -Path $portableDir | Out-Null
          Copy-Item "$releaseDir\*" -Destination $portableDir -Recurse -Force
          Copy-Item "README_USER_WINDOWS.txt" -Destination "$portableDir\README_USER_WINDOWS.txt" -Force
          Compress-Archive -Path "$portableDir\*" -DestinationPath $zipPath

      - name: Upload Windows Portable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cross_todo-portable-win64
          path: frontend/build/windows/x64/runner/cross_todo-portable-win64.zip
          if-no-files-found: error

  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build Android Release APK
        working-directory: frontend
        run: flutter build apk --release --dart-define=API_BASE_URL=https://to-do-list-backend-yrwf.onrender.com

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cross_todo-android-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  macos:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build macOS Release
        working-directory: frontend
        run: flutter build macos --release --dart-define=API_BASE_URL=https://to-do-list-backend-yrwf.onrender.com

      - name: Zip macOS app bundle
        shell: bash
        run: |
          cd frontend/build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent cross_todo.app cross_todo-macos.zip

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cross_todo-macos-app
          path: frontend/build/macos/Build/Products/Release/cross_todo-macos.zip
          if-no-files-found: error

  ios_testflight:
    name: Build iOS and Upload to TestFlight
    runs-on: macos-latest
    steps:
      - name: Check TestFlight Secrets
        id: tf_secrets
        shell: bash
        env:
          TF_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          TF_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          TF_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          if [[ -n "$TF_ISSUER" && -n "$TF_KEY_ID" && -n "$TF_PRIVATE_KEY" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "TestFlight secrets found."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "TestFlight secrets are missing. iOS upload steps will be skipped."
          fi

      - name: Checkout
        if: steps.tf_secrets.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Setup Flutter
        if: steps.tf_secrets.outputs.enabled == 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Dependencies
        if: steps.tf_secrets.outputs.enabled == 'true'
        working-directory: frontend
        run: flutter pub get

      - name: Ensure iOS Platform Files
        if: steps.tf_secrets.outputs.enabled == 'true'
        working-directory: frontend
        run: flutter create . --platforms=ios

      - name: Build iOS IPA
        if: steps.tf_secrets.outputs.enabled == 'true'
        working-directory: frontend
        run: flutter build ipa --release --dart-define=API_BASE_URL=https://to-do-list-backend-yrwf.onrender.com

      - name: Upload to TestFlight
        if: steps.tf_secrets.outputs.enabled == 'true'
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: frontend/build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}

  publish_release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, android, macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Cross Todo ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/cross_todo-portable-win64.zip
            release-assets/cross_todo-macos.zip
            release-assets/app-release.apk
